<!-- VERSÃO 2.1 CORRIGIDA -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Almoxarifado TG 2.1</title>

<style>
body{margin:0;font-family:Arial;background:#1b1f1b;color:white}
header{background:#3b5323;padding:15px;text-align:center;font-size:22px}
.container{display:flex}
.sidebar{width:230px;background:#2e3d2e;min-height:100vh}
.sidebar button{width:100%;padding:12px;background:none;border:none;color:white;text-align:left;cursor:pointer}
.sidebar button:hover{background:#3b5323}
.content{flex:1;padding:20px}
.card{background:#2e3d2e;padding:15px;border-radius:8px;margin-bottom:15px}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:none}
button.action{background:#4caf50;border:none;padding:10px;color:white;cursor:pointer;border-radius:5px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #555;padding:8px}
.alerta{color:yellow;font-weight:bold}
</style>
</head>

<body>

<header>Sistema TG 2.1</header>

<div class="container">

<div class="sidebar">
<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('pessoas')">👤 Pessoas</button>
<button onclick="show('estoque')">📦 Estoque</button>
<button onclick="show('mov')">🔄 Movimentação</button>
<button onclick="show('posse')">🎯 Em uso</button>
<button onclick="show('historico')">📜 Histórico</button>
</div>

<div class="content">

<!-- DASH -->
<div id="dashboard" class="page">
<div class="card">
<h2>Resumo</h2>
<p>Itens: <span id="dItens"></span></p>
<p>Pessoas: <span id="dPessoas"></span></p>
<p>Movimentações: <span id="dMov"></span></p>
</div>
</div>

<!-- PESSOAS -->
<div id="pessoas" class="page" style="display:none">
<div class="card">
<h2>Cadastrar Pessoa</h2>

<input id="nomePessoa" placeholder="Nome">

<select id="funcaoPessoa">
<option>Atirador</option>
<option>Limpeza</option>
<option>Instrutor</option>
<option>Outro</option>
</select>

<input id="numeroPessoa" placeholder="Número (se for atirador)">

<button class="action" onclick="addPessoa()">Cadastrar</button>
</div>

<div class="card">
<ul id="listaPessoas"></ul>
</div>
</div>

<!-- ESTOQUE -->
<div id="estoque" class="page" style="display:none">

<div class="card">
<h2>Cadastrar Item</h2>

<input id="nomeItem" placeholder="Nome">

<select id="tipoItem">
<option>Armamento</option>
<option>Fardamento</option>
<option>Equipamento</option>
<option>Produto de Limpeza</option>
<option>Outro</option>
</select>

<input id="qtdItem" type="number" placeholder="Quantidade">

<button class="action" onclick="addItem()">Cadastrar</button>
</div>

<div class="card">
<table>
<thead>
<tr><th>Item</th><th>Tipo</th><th>Qtd</th><th>Ações</th></tr>
</thead>
<tbody id="tabelaEstoque"></tbody>
</table>
</div>

</div>

<!-- MOV -->
<div id="mov" class="page" style="display:none">
<div class="card">

<h3>Registrar retirada ou devolução</h3>

<select id="selItem"></select>
<select id="selPessoa"></select>

<input id="qtdMov" type="number" placeholder="Quantidade">

<select id="tipoMov">
<option value="saida">Retirada</option>
<option value="entrada">Devolução</option>
</select>

<button class="action" onclick="movimentar()">Registrar</button>

</div>
</div>

<!-- POSSE -->
<div id="posse" class="page" style="display:none">
<div class="card">
<table>
<thead>
<tr><th>Pessoa</th><th>Item</th><th>Qtd</th><th>Ações</th></tr>
</thead>
<tbody id="tabelaPosse"></tbody>
</table>
</div>
</div>

<!-- HIST -->
<div id="historico" class="page" style="display:none">
<div class="card">
<table>
<thead>
<tr><th>Pessoa</th><th>Item</th><th>Qtd</th><th>Tipo</th><th>Data</th></tr>
</thead>
<tbody id="tabelaHist"></tbody>
</table>
</div>
</div>

</div>
</div>

<script>

let estoque = JSON.parse(localStorage.getItem("estoque"))||[];
let pessoas = JSON.parse(localStorage.getItem("pessoas"))||[];
let historico = JSON.parse(localStorage.getItem("historico"))||[];
let posse = JSON.parse(localStorage.getItem("posse"))||[];

function salvar(){
localStorage.setItem("estoque",JSON.stringify(estoque));
localStorage.setItem("pessoas",JSON.stringify(pessoas));
localStorage.setItem("historico",JSON.stringify(historico));
localStorage.setItem("posse",JSON.stringify(posse));
}

function show(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
atualizar();
}

function addPessoa(){
pessoas.push({
nome:nomePessoa.value,
funcao:funcaoPessoa.value,
numero:numeroPessoa.value
});
salvar();
atualizar();
}

function addItem(){

let nome=nomeItem.value;
let tipo=tipoItem.value;
let qtd=parseInt(qtdItem.value);

let existente=estoque.find(e=>e.nome==nome);

if(existente){
existente.qtd+=qtd;
}else{
estoque.push({nome,tipo,qtd,original:qtd});
}

salvar();
atualizar();
}

function movimentar(){

let item=estoque[selItem.value];
let pessoa=pessoas[selPessoa.value];
let qtd=parseInt(qtdMov.value);

if(tipoMov.value=="saida"){
if(item.qtd<qtd)return alert("Sem estoque");

item.qtd-=qtd;

posse.push({pessoa:pessoa.nome,item:item.nome,qtd});
}

if(tipoMov.value=="entrada"){
item.qtd+=qtd;
}

historico.push({
pessoa:pessoa.nome,
item:item.nome,
qtd,
tipo:tipoMov.value,
data:new Date().toLocaleString()
});

salvar();
atualizar();
}

function atualizar(){

dItens.innerHTML=estoque.length;
dPessoas.innerHTML=pessoas.length;
dMov.innerHTML=historico.length;

listaPessoas.innerHTML="";
pessoas.forEach((p,i)=>{
listaPessoas.innerHTML+=`
<li>${p.nome} - ${p.funcao}
<button onclick="pessoas.splice(${i},1);salvar();atualizar()">🗑️</button>
</li>`;
});

tabelaEstoque.innerHTML="";
estoque.forEach((e,i)=>{

let alerta=(e.qtd<e.original)?"<span class='alerta'>⚠</span>":"";

tabelaEstoque.innerHTML+=`
<tr>
<td>${e.nome}</td>
<td>${e.tipo}</td>
<td>${e.qtd} ${alerta}</td>
<td>
<button onclick="estoque.splice(${i},1);salvar();atualizar()">🗑️</button>
</td>
</tr>`;
});

selItem.innerHTML="";
estoque.forEach((e,i)=>{
selItem.innerHTML+=`<option value="${i}">${e.nome}</option>`;
});

selPessoa.innerHTML="";
pessoas.forEach((p,i)=>{
selPessoa.innerHTML+=`<option value="${i}">${p.nome}</option>`;
});

tabelaPosse.innerHTML="";
posse.forEach((p,i)=>{
tabelaPosse.innerHTML+=`
<tr>
<td>${p.pessoa}</td>
<td>${p.item}</td>
<td>${p.qtd}</td>
<td>
<button onclick="posse.splice(${i},1);salvar();atualizar()">🗑️</button>
</td>
</tr>`;
});

tabelaHist.innerHTML="";
historico.forEach(h=>{
tabelaHist.innerHTML+=`
<tr>
<td>${h.pessoa}</td>
<td>${h.item}</td>
<td>${h.qtd}</td>
<td>${h.tipo}</td>
<td>${h.data}</td>
</tr>`;
});

}

atualizar();

</script>

</body>
</html>
